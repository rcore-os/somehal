name: Release-plz

on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed
    branches:
      - main

env:
  qemu-version: 9.2.4

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'rcore-os' && github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    outputs:
      pie-boot-loader-aarch64-released: ${{ steps.check-release.outputs.pie-boot-loader-aarch64-released }}
      pie-boot-loader-aarch64-tag: ${{ steps.check-release.outputs.pie-boot-loader-aarch64-tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Check if pie-boot-loader-aarch64 was released
        id: check-release
        env:
          RELEASES_JSON: ${{ steps.release-plz.outputs.releases }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          releases_json="${RELEASES_JSON:-[]}"
          echo "Release-plz output: $releases_json"

          if ! jq -e . >/dev/null <<<"$releases_json"; then
            echo "::error::release-plz returned invalid JSON in steps.release-plz.outputs.releases"
            exit 1
          fi

          pie_boot_tag="$(jq -r 'first(.[] | select(.package_name == "pie-boot-loader-aarch64") | .tag) // empty' <<<"$releases_json")"

          if [ -n "$pie_boot_tag" ]; then
            echo "pie-boot-loader-aarch64-released=true" >> "$GITHUB_OUTPUT"
            echo "pie-boot-loader-aarch64-tag=$pie_boot_tag" >> "$GITHUB_OUTPUT"
            echo "✅ pie-boot-loader-aarch64 was released with tag: $pie_boot_tag"
            exit 0
          fi

          expected_version="$(
            awk '
              /^\[package\]/ { in_package = 1; next }
              /^\[/ && in_package { in_package = 0 }
              in_package && /^version = / {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' loader/pie-boot-loader-aarch64/Cargo.toml
          )"
          if [ -z "$expected_version" ]; then
            echo "::error::Failed to read pie-boot-loader-aarch64 version from Cargo.toml"
            exit 1
          fi

          expected_tag="pie-boot-loader-aarch64-v$expected_version"
          echo "Expected pie-boot-loader-aarch64 tag from Cargo.toml: $expected_tag"

          release_err="$(mktemp)"
          if release_json="$(gh release view "$expected_tag" --json assets,tagName,url 2>"$release_err")"; then
            echo "Existing release metadata: $release_json"
          else
            if grep -qi "release not found" "$release_err"; then
              echo "pie-boot-loader-aarch64-released=false" >> "$GITHUB_OUTPUT"
              echo "ℹ️ No GitHub release found for $expected_tag"
              rm -f "$release_err"
              exit 0
            fi

            cat "$release_err" >&2
            rm -f "$release_err"
            exit 1
          fi
          rm -f "$release_err"

          asset_present="$(jq -r 'any(.assets[]?; .name == "pie-boot-loader-aarch64.bin")' <<<"$release_json")"
          if [ "$asset_present" = "true" ]; then
            echo "pie-boot-loader-aarch64-released=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Release $expected_tag already contains pie-boot-loader-aarch64.bin"
            exit 0
          fi

          echo "pie-boot-loader-aarch64-released=true" >> "$GITHUB_OUTPUT"
          echo "pie-boot-loader-aarch64-tag=$expected_tag" >> "$GITHUB_OUTPUT"
          echo "✅ Release $expected_tag exists without pie-boot-loader-aarch64.bin, scheduling binary upload"

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'rcore-os' && github.event.workflow_run.conclusion == 'success' }}
    permissions:
      pull-requests: write
      contents: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-and-release-binary:
    name: Build and release pie-boot-loader-aarch64 binary
    runs-on: ubuntu-latest
    needs: release-plz-release
    if: ${{ needs.release-plz-release.outputs.pie-boot-loader-aarch64-released == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-unknown-none-softfloat
          components: rust-src, llvm-tools-preview
      - name: Install cargo-binutils
        run: cargo install cargo-binutils
      - name: Build pie-boot-loader-aarch64 binary
        run:  ./loader/pie-boot-loader-aarch64/build.sh
      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-plz-release.outputs.pie-boot-loader-aarch64-tag }}
          files: |
            target/aarch64-unknown-none-softfloat/release/pie-boot-loader-aarch64.bin
          body: |
            🚀 **pie-boot-loader-aarch64 Binary Release**
            
            This release includes the compiled binary for pie-boot-loader-aarch64.
            
            📦 **Files:**
            - `pie-boot-loader-aarch64.bin` - The compiled loader binary for AArch64 architecture
            
            🔧 **Built with:**
            - Target: aarch64-unknown-none-softfloat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
